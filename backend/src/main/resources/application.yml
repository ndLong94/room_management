spring:
  application:
    name: management-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:migration
  batch:
    job:
      enabled: false  # only run via scheduler (6h), not on startup

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-must-be-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}
  zalo:
    access-token: ${ZALO_ACCESS_TOKEN:}
    enabled: ${ZALO_ENABLED:false}
  base-url: ${APP_BASE_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.management: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
