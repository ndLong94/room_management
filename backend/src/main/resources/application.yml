spring:
  application:
    name: management-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:migration
  batch:
    job:
      enabled: false  # only run via scheduler (6h), not on startup

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    # Set JWT_SECRET in production and CI; dev default lives in application-dev.yml only.
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}
  zalo:
    access-token: ${ZALO_ACCESS_TOKEN:}
    enabled: ${ZALO_ENABLED:false}
  base-url: ${APP_BASE_URL:http://localhost:5173}
  batch:
    invoice-cron: ${APP_BATCH_INVOICE_CRON:0 0 6 * * ?}
    invoice-chunk-size: ${APP_BATCH_INVOICE_CHUNK_SIZE:10}
  feedback:
    max-pending-per-user: ${APP_FEEDBACK_MAX_PENDING:2}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.management: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
