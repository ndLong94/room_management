app:
  jwt:
    # Local dev only — override with JWT_SECRET in .env for consistency with prod.
    secret: ${JWT_SECRET:dev-local-only-not-for-production-min-32-chars}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/room_management
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.management: DEBUG
    org.springframework.web: DEBUG
